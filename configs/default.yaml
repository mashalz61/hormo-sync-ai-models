project:
  name: pcos_ai_project
  random_seed: 42

paths:
  models_dir: models
  reports_dir: reports

data:
  target_aliases:
    pcos:
      - PCOS (Y/N)
      - PCOS
      - pcos
      - pcos_y_n
    insulin_resistance:
      - Insulin Resistance(Y/N)
      - Insulin Resistance
      - insulin resistance
      - IR
      - insulin_resistance
  dropped_columns:
    - Sl. No
    - Patient File No.
    - serial_number
    - patient_id
    - id
  positive_labels:
    - 1
    - "1"
    - Y
    - y
    - Yes
    - yes
    - True
    - true
    - Present
    - present
  negative_labels:
    - 0
    - "0"
    - N
    - n
    - No
    - no
    - False
    - false
    - Absent
    - absent

training:
  test_size: 0.2
  validation_size: 0.2
  cv_folds: 5
  threshold_strategy: f1
  default_threshold: 0.5
  min_precision_floor: 0.2
  cost_based:
    false_positive_cost: 1.0
    false_negative_cost: 2.0
  calibration_method: sigmoid
  tune_threshold: true

reporting:
  probability_level_rules:
    low_upper: 0.33
    medium_upper: 0.66
